<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Планировщик</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-logo">Мой планировщик</h1>
    </div>

    <div id="main-screen">
        <h1>Привет, <span id="username">гость</span>!</h1>
        <button onclick="showScreen('add')" class="menu-item">Добавить событие</button>
    </div>

    <div id="add-screen" class="screen" style="display:none;">
        <h2>Добавить событие</h2>
        <input type="text" placeholder="Название события" class="input-field">
        
        <label>Дата:</label>
        <input type="text" id="date-input" class="input-field" placeholder="Выберите дату..." readonly>
        
        <label>Время:</label>
        <input type="time" class="input-field">
        
        <textarea class="input-field" placeholder="Примечания" rows="3"></textarea>
        
        <button class="save-btn" onclick="showScreen('main')">Сохранить</button>
        <button class="back-btn" onclick="showScreen('main')">Назад</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
</body>
</html>
