<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Планировщик</title>
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-logo">Мой планировщик</h1>
    </div>


    
    <div id="main-screen">
        <h1>Здравствуйте, <span id="username">гость</span>!</h1>
        <div class="grid">
            <button class="menu-item" onclick="showScreen('add')">
            <span style="font-size: 24px;">➕</span> Добавить событие
            </button>
            <button class="menu-item" onclick="showScreen('upcoming')">
                <span style="font-size: 24px;">📅</span> Ближайшие 3 события
            </button>
            <button class="menu-item" onclick="showScreen('all')">
                <span style="font-size: 24px;">📂</span> Все события
            </button>
            <button class="menu-item">
                <span style="font-size: 24px;">⚙️</span> Настройки
            </button>

            <!-- Блок с текущей датой, временем и временем восхода/заката, а также FAQ!-->
            <div class="info-panel">
                <div id="current-day">Сегодня: --</div>
                <div id="current-time">00:00:00</div>
                <div class="sun-times">
                    <span>🌅 Восход: 04:30</span>
                    <span>🌇 Закат: 21:15</span>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="faq-btn" onclick="showScreen('faq')">FAQ / Контакты</button>
            </div>

            <div id="faq-screen" class="screen" style="display: none;">
                <button class="back-btn" onclick="showScreen('main')">← Назад</button>
                <h1>FAQ</h1>
                <p>Здесь будут ваши ответы на вопросы...</p>
                <p><strong>Контакты:</strong> @your_username</p>
            </div>
        </div>
    </div>




    <div id="add-screen" class="screen" style="display: none;">
        <button class="back-btn" onclick="showScreen('main')">← Назад</button>
        <h1>Добавить событие</h1>
        
        <input type="text" id="event-name" placeholder="Название события" class="input-field">

        <div class="type-selector" style="margin-top: 15px; margin-bottom: 15px;">
            <input type="radio" id="type-single" name="event-type" value="single" class="hidden-radio">
            <label for="type-single" class="radio-btn">Одноразовое</label>

            <input type="radio" id="type-recurring" name="event-type" value="recurring" class="hidden-radio">
            <label for="type-recurring" class="radio-btn">Повторяющееся</label>
        </div>
        
        <div class="date-picker-wrapper">
            <label>Дата:</label>
            <input type="date" id="real-date" class="hidden-input">
            <div id="date-btn" class="custom-date-btn" onclick="pickDate()">
                📅 Выбрать дату
            </div>
        </div>

        <div class="date-picker-wrapper" style="margin-top: 10px;">
            <label>Время:</label>
            <input type="time" id="real-time" class="hidden-input">
            <div id="time-btn" class="custom-date-btn" onclick="pickTime()">
                ⏰ Выбрать время
            </div>
        </div>

        <textarea id="event-notes" placeholder="Примечания" class="input-field" rows="3"></textarea>

        <button class="save-btn" onclick="alert('Сохранено!')">Сохранить</button>
    </div>

<!-- Блоки ближайших событий и все события !-->
    <div id="upcoming-screen" class="screen" style="display: none;">
     <button class="back-btn" onclick="showScreen('main')">← Назад</button>
     <h2>📅 Ближайшие события</h2>
     <div id="upcoming-list" class="event-container"></div> 
    </div>

    <div id="all-screen" class="screen" style="display: none;">
      <button class="back-btn" onclick="showScreen('main')">← Назад</button>
      <h2>📂 Все события</h2>
      <div id="all-list" class="event-container"></div> 
    </div>

<!-- Модальное окно в блоке "Все события" !-->

   <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <button class="back-btn" onclick="closeModal()">← Назад</button>
        <h2 id="modal-title"></h2>
        <p><strong>Дата:</strong> <span id="modal-date"></span></p>
        <p><strong>Время:</strong> <span id="modal-time"></span></p>
        <p><strong>Примечания:</strong> <span id="modal-notes"></span></p>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="edit-btn" onclick="editEvent()" >Редактировать</button>
            <button class="delete-btn" onclick="deleteEvent()">Удалить</button>
        </div>
    </div>
    </div>


    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
