<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Планировщик</title>
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-logo">Мой планировщик</h1>
    </div>

    <div id="main-screen">
        <h1>Здравствуйте, <span id="username">гость</span>!</h1>
        
        <div class="grid">
            <button class="menu-item" onclick="showScreen('add')">
                <span style="font-size: 24px;">➕</span> Добавить событие
            </button>
            <button class="menu-item" onclick="showScreen('upcoming')">
                <span style="font-size: 24px;">📅</span> Ближайшие 3 события
            </button>
            <button class="menu-item" onclick="showScreen('all')">
                <span style="font-size: 24px;">📂</span> Все события
            </button>
            <button class="menu-item">
                <span style="font-size: 24px;">⚙️</span> Настройки
            </button>
        </div>

        <div class="time-container">
            <div id="current-day" class="day-text">Сегодня: --</div>
            <div id="current-time" class="time-text">00:00:00</div>
            <div class="sun-times">
                <span>🌅 Восход:  04:30</span>
                <span>🌇 Закат:  21:15</span>
            </div>
        </div>

        <footer class="main-footer">
            <button class="faq-btn" onclick="showScreen('faq')">FAQ / Контакты</button>
        </footer>
    </div>

    <div id="add-screen" class="screen" style="display: none;">
        <button class="back-btn" onclick="showScreen('main')">← Назад</button>
        <h1>Добавить событие</h1>
        <input type="text" id="event-name" placeholder="Название события (не более 50 символов)" class="input-field" maxlength="50">
        <div class="type-selector-wrapper">
            <div class="type-option" onclick="selectType(this, 'once')">Одноразовое</div>
            <div class="type-option" onclick="selectType(this, 'recurring')">Повторяющееся</div>
        </div>
        <div class="date-picker-wrapper">
            <input type="date" id="real-date" class="hidden-input">
            <div id="date-btn" class="custom-date-btn" onclick="pickDate()">📅 Выбрать дату</div>
        </div>
        <div class="date-picker-wrapper">
            <input type="time" id="real-time" class="hidden-input">
            <div id="time-btn" class="custom-date-btn" onclick="pickTime()">⏰ Выбрать время</div>
        </div>
        <textarea id="event-notes" placeholder="Примечания (не более 500)" class="input-field" rows="3" maxlength="500"></textarea>
        <button class="save-btn" onclick="saveEvent()">Сохранить</button>
    </div>

    <div id="upcoming-screen" class="screen" style="display: none;">
        <button class="back-btn" onclick="showScreen('main')">← Назад</button>
        <h2>📅 Ближайшие события</h2>
        <div id="upcoming-list" class="event-container"></div> 
    </div>

    <div id="all-screen" class="screen" style="display: none;">
        <button class="back-btn" onclick="showScreen('main')">← Назад</button>
        <h2>📂 Все события</h2>
        <div id="all-list" class="event-container"></div> 
    </div>

    <div id="faq-screen" class="screen" style="display: none;">
        <button class="back-btn" onclick="showScreen('main')">← Назад</button>
        <h1>Часто задаваемые вопросы</h1>
        <div id="faq-list"></div>
    </div>

   <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <button class="back-btn" onclick="closeModal()">← Назад</button>
        <h2 id="modal-title"></h2>
        
        <p><strong>Дата:</strong> <span id="modal-date"></span></p>
        <p><strong>Время:</strong> <span id="modal-time"></span></p>
        
        <p><strong>Примечания:</strong></p>
        <div id="modal-notes-display" class="notes-display-box"></div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="edit-btn" onclick="editEvent()">Редактировать</button>
            <button class="delete-btn" onclick="deleteEvent()">Удалить</button>
        </div>
    </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
    <script src="faq-data.js"></script>
</body>
</html>
