<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Планировщик</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-logo">МОЙ ПЛАНИРОВЩИК</h1>
    </div>

    <div id="main-screen">
        <h1>Здравствуйте, <span id="username">гость</span>!</h1>
        <div class="grid">
            <button class="menu-item" onclick="showScreen('add')">+ Добавить</button>
            <button class="menu-item">📅 Ближайшие</button>
            <button class="menu-item">📂 Все события</button>
            <button class="menu-item">⚙️ Редактировать</button>
        </div>
    </div>

    <div id="add-screen" class="screen" style="display: none;">
        <button class="back-btn" onclick="showScreen('main')">← Назад</button>
        <h1>Добавить событие</h1>
        
        <input type="text" id="event-name" placeholder="Название события" class="input-field">
        
        <div class="date-picker-wrapper">
            <label>Дата события:</label>
            <input type="text" id="date-input" class="input-field" placeholder="Нажмите для выбора даты..." readonly>
        </div>

        <div class="date-picker-wrapper" style="margin-top: 10px;">
            <label>Время:</label>
            <input type="time" id="real-time" class="hidden-input">
            <div class="custom-date-btn" onclick="document.getElementById('real-time').showPicker()">
                ⏰ Выбрать время
            </div>
        </div>

        <textarea id="event-notes" placeholder="Примечания" class="input-field" rows="3"></textarea>
        
        <button class="save-btn" onclick="alert('Сохранено!')">Сохранить</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
